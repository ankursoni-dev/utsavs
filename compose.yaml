name: utsavs

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: dev
    container_name: utsavs-api
    ports:
      - '3001:3001'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/test:/app/apps/api/test
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./apps/api/prisma.config.ts:/app/apps/api/prisma.config.ts
      - ./apps/api/nest-cli.json:/app/apps/api/nest-cli.json
      - ./apps/api/tsconfig.json:/app/apps/api/tsconfig.json
      - ./apps/api/tsconfig.build.json:/app/apps/api/tsconfig.build.json
      - ./packages/shared-types/src:/app/packages/shared-types/src
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://utsavs:utsavs@postgres:5432/utsavs
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: dev
    container_name: utsavs-web
    ports:
      - '3000:3000'
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./apps/web/next.config.ts:/app/apps/web/next.config.ts
      - ./apps/web/tsconfig.json:/app/apps/web/tsconfig.json
      - ./apps/web/postcss.config.mjs:/app/apps/web/postcss.config.mjs
      - ./packages/shared-types/src:/app/packages/shared-types/src
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: utsavs-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: utsavs
      POSTGRES_PASSWORD: utsavs
      POSTGRES_DB: utsavs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U utsavs -d utsavs']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: utsavs-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
